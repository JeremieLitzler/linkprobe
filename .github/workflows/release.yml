# release.yml
name: Automatic Release
run-name: ${{ github.actor }} is automatically releasing 🚀

on:
  # Run automatically on main pushes
  push:
    branches:
      - main

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment:
      # This is the name of your env created under https://github.com/{user}/{repo_name}/settings/environments/
      name: CI
    steps:
      - name: 'Generate token'
        id: generate_token
        uses: tibdex/github-app-token@v1
        with:
          # These are the secrets declared in the environment
          app_id: ${{ secrets.GH_APP_ID }}
          private_key: ${{ secrets.GH_APP_KEY }}
      # Check out the code to be able to deploy
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ github.event.pull_request.base.ref }}
      # Setting up Node LTS
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
      # Make sure all the dependencies are ok and installed
      - name: 'Installing dependencies'
        run: npm ci --legacy-peer-deps
      # Install semantic release
      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}

      - name: Update version in index.html
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          VERSION="${{ steps.semantic.outputs.new_release_version }}"
          # Hero badge
          sed -i 's/<span class="badge">v[0-9]*\.[0-9]*\.[0-9]*<\/span>/<span class="badge">v'"$VERSION"'<\/span>/' website/index.html
          # Footer version
          sed -i 's/<span>v[0-9]*\.[0-9]*\.[0-9]*<\/span>/<span>v'"$VERSION"'<\/span>/' website/index.html

      - name: Commit and push updated index.html
        # The `if` guard ensures the steps only run when a new release was actually published.
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          # `[skip ci]` in the commit message prevents an infinite loop of triggered workflows.
          git commit -m "chore: update index.html version to ${{ steps.semantic.outputs.new_release_version }} [skip ci]"
          git push https://x-access-token:${{ steps.generate_token.outputs.token }}@github.com/${{ github.repository }}.git HEAD:main
