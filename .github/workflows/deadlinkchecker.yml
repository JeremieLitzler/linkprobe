name: Link Checker

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  check-links:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Run link checker
        run: |
          DATE=$(date +%Y-%m-%d)
          SITES=(
            "www.cogeternal.org"
            "www.example.com"
            "www.another.org"
          )
          mkdir -p scans
          for SITE in "${SITES[@]}"; do
            python src/checker.py https://$SITE -o scans/$SITE-$DATE.csv
          done
      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scans/
          git diff --cached --quiet || git commit -m "bot: add scan for $(date +%Y-%m-%d)"
          git push
