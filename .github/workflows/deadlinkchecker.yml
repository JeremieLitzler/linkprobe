name: Link Checker

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  check-links:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure data/scans branch exists
        run: |
          git fetch origin data/scans || true
          git checkout data/scans 2>/dev/null || git checkout -b data/scans

      - name: Run link checker
        run: |
          DATE=$(date +%Y-%m-%d)
          SITES=(
            "www.cogeternal.org"
            "fr.cogeternal.org"
            "iamjeremie.me",
            "jeremielitzler.fr"
          )
          mkdir -p scans
          for SITE in "${SITES[@]}"; do
            python src/checker.py https://$SITE -o scans/$SITE-$DATE.csv
          done

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scans/
          git diff --cached --quiet || git commit -m "bot: add scan for $(date +%Y-%m-%d)"
          git push origin data/scans
